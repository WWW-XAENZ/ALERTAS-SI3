<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI3 - Recepcion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A5F;
            --accent: #E85D04;
            --bg: #F8FAFC;
            --bg-card: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(232, 93, 4, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(30, 58, 95, 0.08) 0%, transparent 50%);
        }
        
        .container { max-width: 420px; margin: 0 auto; }
        
        .header-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-mini {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-mini img { width: 40px; }
        
        .logo-mini h1 {
            font-size: 16px;
            color: var(--accent);
            font-weight: 700;
        }
        
        .btn-cerrar {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
        }
        
        .btn-cerrar:hover { background: #EF4444; color: white; border-color: #EF4444; }
        
        .main-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #2D5A87);
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        
        .user-details h2 { font-size: 18px; color: white; font-weight: 600; }
        .user-details p { font-size: 13px; color: rgba(255,255,255,0.8); }
        
        .schedule-card {
            background: #FEF3C7;
            border: 2px solid #FCD34D;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .schedule-card .label {
            font-size: 12px;
            color: #92400E;
            margin-bottom: 8px;
        }
        
        .schedule-card .time {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .horarios {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .horarios-title {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .horario-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        
        .horario-item:last-child { border-bottom: none; }
        .horario-item.past { color: var(--text-secondary); text-decoration: line-through; }
        .horario-item.current { color: var(--success); font-weight: 600; }
        
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }
        
        .form-section h3 {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .codigo-input {
            width: 100%;
            padding: 18px;
            font-size: 24px;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: var(--bg);
            margin-bottom: 16px;
        }
        
        .codigo-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-enviar {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-enviar:hover {
            background: #F97316;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div class="logo-mini">
                <img src="Logo-Web-SI3.png" alt="SI3">
                <h1>RECEPCION</h1>
            </div>
            <button class="btn-cerrar" onclick="logout()">Cerrar</button>
        </div>
        
        <div class="main-card">
            <div class="user-info">
                <div class="avatar">AR</div>
                <div class="user-details">
                    <h2>Anderson Rojas</h2>
                    <p>Recepcion</p>
                </div>
            </div>
            
            <div class="schedule-card">
                <div class="label">Proximo aviso programado</div>
                <div class="time" id="proximoAviso">--:--</div>
            </div>
            
            <div class="horarios" id="listaHorarios">
                <div class="horarios-title">Horarios del dia</div>
            </div>
            
            <div class="divider"></div>
            
            <div class="form-section">
                <h3>Crear nuevo aviso</h3>
                <input type="text" class="codigo-input" id="codigoInput" 
                       placeholder="000000" maxlength="10" 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <button class="btn-enviar" onclick="enviarAviso()">
                    ENVIAR AVISO AL SUPERVISOR
                </button>
            </div>
        </div>
    </div>
    
    <script src="supabase.js"></script>
    <script>
        function verificarSesion() {
            var rol = sessionStorage.getItem('rol');
            if (!rol || rol !== 'recepcion') {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        function actualizarHorario() {
            var ahora = new Date();
            var dia = ahora.getDay();
            var horarios = HORARIOS_RECEPCION[dia];
            var proximoEl = document.getElementById('proximoAviso');
            var listaEl = document.getElementById('listaHorarios');
            
            if (!horarios || horarios.length === 0) {
                proximoEl.textContent = 'SIN PROGRAMAR';
                listaEl.innerHTML = '<div class="horarios-title">Horarios</div><div style="color:#64748B">Hoy no hay avisos</div>';
                return;
            }
            
            var horaActual = ahora.getHours() * 60 + ahora.getMinutes();
            var html = '<div class="horarios-title">Horarios del dia</div>';
            var proximo = null;
            
            for (var i = 0; i < horarios.length; i++) {
                var h = horarios[i];
                var parts = h.split(':');
                var hh = parseInt(parts[0]);
                var mm = parseInt(parts[1]);
                var minutos = hh * 60 + mm;
                var clase = 'future';
                if (minutos < horaActual - 30) clase = 'past';
                else if (Math.abs(minutos - horaActual) <= 30) clase = 'current';
                html += '<div class="horario-item ' + clase + '"><span>' + hh + ':' + (mm < 10 ? '0' : '') + mm + '</span><span>' + (clase === 'past' ? 'Completado' : clase === 'current' ? 'ACTIVO' : 'Pendiente') + '</span></div>';
                if (!proximo && minutos > horaActual) proximo = h;
            }
            
            listaEl.innerHTML = html;
            
            if (proximo) {
                var parts = proximo.split(':');
                proximoEl.textContent = parts[0] + ':' + parts[1];
            } else if (horarios.length > 0) {
                var parts = horarios[0].split(':');
                proximoEl.textContent = parts[0] + ':' + parts[1];
            }
        }
        
        function enviarAviso() {
            var codigo = document.getElementById('codigoInput').value.trim();
            
            if (!codigo) {
                alert('Ingresa un codigo numerico');
                return;
            }
            
            if (!/^\d+$/.test(codigo)) {
                alert('El codigo debe contener solo numeros');
                return;
            }
            
            var usuario = sessionStorage.getItem('usuario');
            guardarAlerta(codigo, 'recepcion', usuario);
            
            document.getElementById('codigoInput').value = '';
            alert('Aviso enviado al supervisor');
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
        
        if (verificarSesion()) {
            sincronizarAlertas();
            actualizarHorario();
            setInterval(function() {
                sincronizarAlertas();
            }, 30000);
        }
    </script>
</body>
</html>
