<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI3 - Alistador</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-dark: #0F2744;
            --accent: #E85D04;
            --accent-light: #F97316;
            --bg: #F1F5F9;
            --bg-card: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            background-image: 
                radial-gradient(ellipse at 0% 0%, rgba(30, 58, 95, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(232, 93, 4, 0.08) 0%, transparent 50%);
        }
        .container { max-width: 400px; margin: 0 auto; }
        .header-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-mini { display: flex; align-items: center; gap: 10px; }
        .logo-mini img { width: 36px; }
        .logo-mini h1 { font-size: 15px; color: var(--accent); font-weight: 700; }
        .btn-cerrar {
            padding: 10px 18px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            color: var(--danger);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-cerrar:hover { background: var(--danger); color: white; }
        .main-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            animation: slideUp 0.5s ease 0.1s both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        .user-details h2 { font-size: 17px; color: white; font-weight: 600; }
        .user-details p { font-size: 12px; color: rgba(255,255,255,0.7); }
        .turno-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .turno-btn {
            padding: 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }
        .turno-btn.active { background: var(--success); border-color: var(--success); color: white; }
        .turno-btn small { display: block; font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .status-badge.active {
            background: linear-gradient(135deg, var(--danger), #DC2626);
            color: white;
            animation: pulseAlert 1.2s ease-in-out infinite;
        }
        @keyframes pulseAlert {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .status-badge.inactive {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }
        .alert-box {
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            border: 2px solid #FCD34D;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            display: none;
            animation: fadeInScale 0.4s ease;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .alert-box.visible { display: block; }
        .alert-box .label {
            font-size: 12px;
            color: #92400E;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .alert-box .codigo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 14px;
            letter-spacing: 3px;
        }
        .horarios {
            background: linear-gradient(135deg, var(--bg), #F8FAFC);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .horarios-title {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 14px;
            font-weight: 700;
        }
        .horario-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            font-size: 15px;
        }
        .horario-item:last-child { border-bottom: none; }
        .horario-item .time { font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .horario-item.past { color: var(--text-light); }
        .horario-item.past .time { text-decoration: line-through; }
        .horario-item.current { color: var(--success); font-weight: 700; }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 24px 0; }
        .form-section h3 { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 16px; font-weight: 700; }
        .codigo-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 28px;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            letter-spacing: 6px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: var(--bg);
            margin-bottom: 16px;
        }
        .codigo-input:focus { outline: none; border-color: var(--accent); }
        .codigo-input::placeholder { letter-spacing: 6px; color: var(--text-light); }
        .btn-enviar {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(232, 93, 4, 0.3);
        }
        .btn-enviar:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div class="logo-mini"><img src="Logo-Web-SI3.png" alt="SI3"><h1>ALISTADOR</h1></div>
            <button class="btn-cerrar" onclick="logout()">Cerrar</button>
        </div>
        <div class="main-card">
            <div class="user-info">
                <div class="avatar">DV</div>
                <div class="user-details"><h2>David Valencia</h2><p id="turnoLabel">Turno 1</p></div>
            </div>
            <div class="turno-selector">
                <button class="turno-btn active" id="turno1Btn" onclick="cambiarTurno(1)">Turno 1<small>6:00 - 14:00</small></button>
                <button class="turno-btn" id="turno2Btn" onclick="cambiarTurno(2)">Turno 2<small>14:00 - 22:00</small></button>
            </div>
            <div class="status-badge inactive" id="status">Sin alertas de tu turno</div>
            <div class="alert-box" id="alertBox">
                <div class="label">ALERTA - TURNO <span id="turnoNum">1</span></div>
                <div class="codigo" id="alertCode">---</div>
            </div>
            <div class="horarios" id="listaHorarios"><div class="horarios-title">Horarios</div></div>
            <div class="divider"></div>
            <div class="form-section">
                <h3>Escribir codigo</h3>
                <input type="text" class="codigo-input" id="codeInput" placeholder="0000000000" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <button class="btn-enviar" id="btnEnviar" onclick="enviarAviso()">ENVIAR CODIGO AL SUPERVISOR</button>
            </div>
        </div>
    </div>
    <script src="supabase.js"></script>
    <script>
        var turno = 1;
        var ultimaAlerta = null;
        var usuario = 'david';
        
        function verificarSesion() {
            var rol = sessionStorage.getItem('rol');
            if (!rol || rol !== 'alistador') { window.location.href = 'index.html'; return false; }
            return true;
        }
        
        function cambiarTurno(n) {
            turno = n;
            document.getElementById('turno1Btn').className = n === 1 ? 'turno-btn active' : 'turno-btn';
            document.getElementById('turno2Btn').className = n === 2 ? 'turno-btn active' : 'turno-btn';
            document.getElementById('turnoLabel').textContent = 'Turno ' + n;
            document.getElementById('turnoNum').textContent = n;
            actualizarHorario();
            verificarAlertas();
        }
        
        function actualizarHorario() {
            var horarios = turno === 1 ? HORARIOS_ALISTADOR_TURNO1 : HORARIOS_ALISTADOR_TURNO2;
            var ahora = new Date();
            var horaActual = ahora.getHours() * 60 + ahora.getMinutes();
            var html = '<div class="horarios-title">Horarios</div>';
            
            for (var i = 0; i < horarios.length; i++) {
                var h = horarios[i];
                var parts = h.split(':');
                var hh = parseInt(parts[0]);
                var mm = parseInt(parts[1]);
                var minutos = hh * 60 + mm;
                var clase = 'pending';
                var estado = 'Pendiente';
                
                if (minutos < horaActual - 30) { clase = 'past'; estado = 'Completado'; }
                else if (Math.abs(minutos - horaActual) <= 30) { clase = 'current'; estado = 'ACTIVO'; }
                
                html += '<div class="horario-item ' + clase + '"><span class="time">' + hh + ':' + (mm < 10 ? '0' : '') + mm + '</span><span>' + estado + '</span></div>';
            }
            document.getElementById('listaHorarios').innerHTML = html;
        }
        
        function verificarAlertas() {
            var misAlertas = obtenerAlertasDelTurno(turno);
            var status = document.getElementById('status');
            var alertBox = document.getElementById('alertBox');
            var btnEnviar = document.getElementById('btnEnviar');
            
            if (misAlertas.length > 0) {
                var a = misAlertas[0];
                if (ultimaAlerta !== a.id) {
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
                    playSound();
                    ultimaAlerta = a.id;
                }
                status.className = 'status-badge active';
                status.textContent = 'ALERTA - TURNO ' + turno;
                alertBox.className = 'alert-box visible';
                document.getElementById('alertCode').textContent = a.codigo;
                btnEnviar.textContent = 'AVISO RECIBIDO';
                btnEnviar.style.background = 'var(--success)';
            } else {
                status.className = 'status-badge inactive';
                status.textContent = 'Sin alertas - Turno ' + turno;
                alertBox.className = 'alert-box';
                btnEnviar.textContent = 'ENVIAR CODIGO AL SUPERVISOR';
                btnEnviar.style.background = 'linear-gradient(135deg, var(--accent), var(--accent-light))';
                ultimaAlerta = null;
            }
        }
        
        function playSound() {
            try {
                var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var now = audioCtx.currentTime;
                [880, 1100, 880, 1100].forEach(function(freq, i) {
                    var osc = audioCtx.createOscillator();
                    var gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'square';
                    gain.gain.setValueAtTime(0.2, now + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.14);
                    osc.start(now + i * 0.15);
                    osc.stop(now + i * 0.15 + 0.15);
                });
            } catch(e) {}
        }
        
        function enviarAviso() {
            var codigo = document.getElementById('codeInput').value.trim();
            if (!codigo) { alert('Por favor ingresa un codigo numerico'); return; }
            if (!/^\d+$/.test(codigo)) { alert('El codigo debe contener solo numeros'); return; }
            var tipo = turno === 1 ? 'alistador1' : 'alistador2';
            guardarAlerta(codigo, tipo, usuario);
            document.getElementById('codeInput').value = '';
            verificarAlertas();
            alert('Aviso enviado correctamente al supervisor');
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
        
        if (verificarSesion()) {
            sincronizarAlertas();
            actualizarHorario();
            verificarAlertas();
            setInterval(function() { sincronizarAlertas(); verificarAlertas(); }, 5000);
        }
    </script>
</body>
</html>
