<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI3 - Supervisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A5F;
            --accent: #E85D04;
            --bg: #F8FAFC;
            --bg-card: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(232, 93, 4, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(30, 58, 95, 0.08) 0%, transparent 50%);
        }
        
        .container {
            max-width: 420px;
            margin: 0 auto;
        }
        
        .header-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-mini {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-mini img {
            width: 40px;
        }
        
        .logo-mini h1 {
            font-size: 16px;
            color: var(--accent);
            font-weight: 700;
        }
        
        .btn-cerrar {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-cerrar:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        .main-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #2D5A87);
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        
        .user-details h2 {
            font-size: 18px;
            color: white;
            font-weight: 600;
        }
        
        .user-details p {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .status-badge.active {
            background: linear-gradient(135deg, var(--danger), #DC2626);
            color: white;
            animation: pulse 1.5s infinite;
        }
        
        .status-badge.inactive {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .alert-box {
            background: #FEF3C7;
            border: 2px solid #FCD34D;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            display: none;
        }
        
        .alert-box.visible { display: block; }
        
        .alert-box .label {
            font-size: 11px;
            color: #92400E;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .alert-box .codigo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            padding: 16px;
            background: white;
            border-radius: 12px;
            letter-spacing: 3px;
        }
        
        .alert-box .info {
            font-size: 12px;
            color: #92400E;
            text-align: center;
            margin-top: 12px;
        }
        
        .btn-completar {
            width: 100%;
            padding: 16px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }
        
        .btn-completar:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text-secondary);
        }
        
        .history-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .history-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .btn-limpiar {
            padding: 8px 16px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .history-item {
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .history-codigo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        
        .history-tipo {
            font-size: 10px;
            padding: 4px 10px;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            font-weight: 600;
        }
        
        .history-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        
        .history-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-small {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-danger-outline {
            background: white;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div class="logo-mini">
                <img src="Logo-Web-SI3.png" alt="SI3">
                <h1>SUPERVISOR</h1>
            </div>
            <button class="btn-cerrar" onclick="logout()">Cerrar</button>
        </div>
        
        <div class="main-card">
            <div class="user-info">
                <div class="avatar">JL</div>
                <div class="user-details">
                    <h2>Juan Pablo Londoño</h2>
                    <p>Panel de Control</p>
                </div>
            </div>
            
            <div class="status-badge inactive" id="status">
                Sin alertas pendientes
            </div>
            
            <div class="alert-box" id="alertBox">
                <div class="label">Alerta activa</div>
                <div class="codigo" id="alertCodigo">---</div>
                <div class="info" id="alertInfo">---</div>
                <button class="btn-completar" onclick="completarTodas()">
                    COMPLETAR TODAS LAS ALERTAS
                </button>
            </div>
            
            <div class="empty-state" id="emptyState">
                No hay alertas activas en este momento
            </div>
        </div>
        
        <div class="history-section">
            <div class="history-header">
                <h3>Historial de Avisos</h3>
                <button class="btn-limpiar" onclick="limpiarHistorial()">LIMPIAR TODO</button>
            </div>
            <div id="historial"></div>
        </div>
    </div>
    
    <script src="supabase.js"></script>
    <script>
        function verificarSesion() {
            var rol = sessionStorage.getItem('rol');
            if (!rol || rol !== 'supervisor') {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        function formatearHora(fechaStr) {
            var fecha = new Date(fechaStr);
            return fecha.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }
        
        function getNombreTipo(tipo) {
            var nombres = { 
                'recepcion': 'Recepcion', 
                'alistador1': 'Alistador Turno 1', 
                'alistador2': 'Alistador Turno 2' 
            };
            return nombres[tipo] || tipo;
        }
        
        function cargarAlertas() {
            var todasAlertas = obtenerAlertas();
            var alertasActivas = todasAlertas.filter(function(a) { return a.activa; });
            
            var status = document.getElementById('status');
            var alertBox = document.getElementById('alertBox');
            var emptyState = document.getElementById('emptyState');
            
            if (alertasActivas.length > 0) {
                var a = alertasActivas[0];
                status.className = 'status-badge active';
                status.textContent = 'ALERTA ACTIVA';
                alertBox.className = 'alert-box visible';
                emptyState.style.display = 'none';
                document.getElementById('alertCodigo').textContent = a.codigo;
                document.getElementById('alertInfo').textContent = getNombreTipo(a.tipo) + ' - ' + a.nombreCreador + ' - ' + formatearHora(a.created_at);
                
                if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
            } else {
                status.className = 'status-badge inactive';
                status.textContent = 'Sin alertas pendientes';
                alertBox.className = 'alert-box';
                emptyState.style.display = 'block';
            }
            
            var html = '';
            for (var i = 0; i < todasAlertas.length; i++) {
                var a = todasAlertas[i];
                html += '<div class="history-item">';
                html += '<div class="history-item-header">';
                html += '<span class="history-codigo">' + a.codigo + '</span>';
                html += '<span class="history-tipo">' + getNombreTipo(a.tipo) + '</span>';
                html += '</div>';
                html += '<div class="history-meta">' + a.nombreCreador + ' - ' + formatearHora(a.created_at) + '</div>';
                
                if (a.activa) {
                    html += '<div class="history-actions">';
                    html += '<button class="btn-small btn-success" onclick="completarUna(' + a.id + ')">COMPLETAR</button>';
                    html += '<button class="btn-small btn-danger-outline" onclick="eliminarUna(' + a.id + ')">ELIMINAR</button>';
                    html += '</div>';
                }
                html += '</div>';
            }
            
            document.getElementById('historial').innerHTML = html || '<div class="empty-state">No hay historial</div>';
        }
        
        function completarUna(id) {
            completarAlerta(id);
            cargarAlertas();
        }
        
        function eliminarUna(id) {
            if (!confirm('Eliminar esta alerta?')) return;
            eliminarAlerta(id);
            cargarAlertas();
        }
        
        function completarTodas() {
            if (!confirm('Completar todas las alertas?')) return;
            completarTodasAlertas();
            cargarAlertas();
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
        }
        
        function limpiarHistorial() {
            if (!confirm('Eliminar todo el historial?')) return;
            eliminarTodasAlertas();
            cargarAlertas();
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
        
        if (verificarSesion()) {
            cargarAlertas();
            setInterval(cargarAlertas, 3000);
        }
    </script>
</body>
</html>
