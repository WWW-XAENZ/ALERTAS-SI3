<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI3 - Alistador</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1E3A5F; --accent: #E85D04; --bg: #F8FAFC; --bg-card: #FFFFFF; --text: #0F172A; --text-secondary: #64748B; --border: #E2E8F0; --success: #10B981; --danger: #EF4444; --shadow: 0 4px 20px rgba(0,0,0,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px;
            background-image: radial-gradient(circle at 20% 80%, rgba(232, 93, 4, 0.05) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(30, 58, 95, 0.08) 0%, transparent 50%); }
        .container { max-width: 420px; margin: 0 auto; }
        .header-card { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo-mini { display: flex; align-items: center; gap: 12px; }
        .logo-mini img { width: 40px; }
        .logo-mini h1 { font-size: 16px; color: var(--accent); font-weight: 700; }
        .btn-cerrar { padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--text-secondary); font-weight: 500; cursor: pointer; font-family: 'Poppins', sans-serif; }
        .btn-cerrar:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .main-card { background: var(--bg-card); border-radius: 20px; padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px; }
        .user-info { display: flex; align-items: center; gap: 14px; padding: 16px; background: linear-gradient(135deg, var(--primary), #2D5A87); border-radius: 16px; margin-bottom: 20px; }
        .avatar { width: 56px; height: 56px; background: rgba(255,255,255,0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: white; }
        .user-details h2 { font-size: 18px; color: white; font-weight: 600; }
        .user-details p { font-size: 13px; color: rgba(255,255,255,0.8); }
        .turno-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .turno-btn { padding: 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 14px; color: var(--text-secondary); cursor: pointer; font-weight: 500; transition: all 0.2s; font-family: 'Poppins', sans-serif; }
        .turno-btn.active { background: var(--success); border-color: var(--success); color: white; }
        .turno-btn small { display: block; font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .status-badge { display: flex; align-items: center; justify-content: center; padding: 14px 24px; border-radius: 14px; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .status-badge.active { background: linear-gradient(135deg, var(--danger), #DC2626); color: white; animation: pulse 1.5s infinite; }
        .status-badge.inactive { background: linear-gradient(135deg, var(--success), #059669); color: white; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .alert-box { background: #FEF3C7; border: 2px solid #FCD34D; border-radius: 16px; padding: 24px; margin-bottom: 20px; display: none; }
        .alert-box.visible { display: block; }
        .alert-box .label { font-size: 11px; color: #92400E; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
        .alert-box .codigo { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; color: var(--accent); text-align: center; padding: 20px; background: white; border-radius: 12px; letter-spacing: 4px; }
        .horarios { background: var(--bg); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .horarios-title { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
        .horario-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .horario-item:last-child { border-bottom: none; }
        .horario-item.past { color: var(--text-secondary); text-decoration: line-through; }
        .horario-item.current { color: var(--success); font-weight: 600; }
        .divider { height: 1px; background: var(--border); margin: 24px 0; }
        .form-section h3 { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 16px; font-weight: 600; }
        .codigo-input { width: 100%; padding: 18px; font-size: 24px; font-family: 'JetBrains Mono', monospace; text-align: center; letter-spacing: 4px; border: 2px solid var(--border); border-radius: 14px; background: var(--bg); margin-bottom: 16px; }
        .codigo-input:focus { outline: none; border-color: var(--accent); }
        .btn-enviar { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
        .btn-enviar:hover { background: #F97316; transform: translateY(-2px); }
        .btn-enviar-success { background: var(--success) !important; }
        .info-text { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 8px; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div class="logo-mini"><img src="Logo-Web-SI3.png" alt="SI3"><h1>ALISTADOR</h1></div>
            <button class="btn-cerrar" onclick="logout()">Cerrar</button>
        </div>
        <div class="main-card">
            <div class="user-info">
                <div class="avatar">MG</div>
                <div class="user-details"><h2>Mateo Guarin</h2><p id="turnoLabel">Turno 1</p></div>
            </div>
            <div class="turno-selector">
                <button class="turno-btn active" id="turno1Btn" onclick="cambiarTurno(1)">Turno 1<small>6:00 - 14:00</small></button>
                <button class="turno-btn" id="turno2Btn" onclick="cambiarTurno(2)">Turno 2<small>14:00 - 22:00</small></button>
            </div>
            <div class="status-badge inactive" id="status">Sin alertas de tu turno</div>
            <div class="alert-box" id="alertBox"><div class="label">ALERTA - TURNO <span id="turnoNum">1</span></div><div class="codigo" id="codigoAlerta">---</div></div>
            <div class="horarios" id="listaHorarios"><div class="horarios-title">Horarios</div></div>
            <div class="divider"></div>
            <div class="form-section"><h3>Crear nuevo aviso</h3>
                <input type="text" class="codigo-input" id="codigoInput" placeholder="000000" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <button class="btn-enviar" onclick="enviarAviso()">ENVIAR AVISO AL SUPERVISOR</button>
                <p class="info-text">El supervisor recibirá tu aviso inmediatamente</p>
            </div>
        </div>
    </div>
    <script src="supabase.js"></script>
    <script>
        var turno = 1;
        function verificarSesion() { var rol = sessionStorage.getItem('rol'); if (!rol || rol !== 'alistador') { window.location.href = 'index.html'; return false; } return true; }
        function cambiarTurno(n) {
            turno = n;
            document.getElementById('turno1Btn').className = n === 1 ? 'turno-btn active' : 'turno-btn';
            document.getElementById('turno2Btn').className = n === 2 ? 'turno-btn active' : 'turno-btn';
            document.getElementById('turnoLabel').textContent = 'Turno ' + n;
            document.getElementById('turnoNum').textContent = n;
            actualizarHorario();
            verificarAlertas();
        }
        function actualizarHorario() {
            var horarios = turno === 1 ? HORARIOS_ALISTADOR_TURNO1 : HORARIOS_ALISTADOR_TURNO2;
            var ahora = new Date(); var horaActual = ahora.getHours() * 60 + ahora.getMinutes();
            var html = '<div class="horarios-title">Horarios Turno ' + turno + '</div>';
            for (var i = 0; i < horarios.length; i++) {
                var h = horarios[i]; var parts = h.split(':'); var hh = parseInt(parts[0]); var mm = parseInt(parts[1]); var minutos = hh * 60 + mm;
                var clase = 'future'; if (minutos < horaActual - 30) clase = 'past'; else if (Math.abs(minutos - horaActual) <= 30) clase = 'current';
                html += '<div class="horario-item ' + clase + '"><span>' + hh + ':' + (mm < 10 ? '0' : '') + mm + '</span><span>' + (clase === 'past' ? 'Completado' : clase === 'current' ? 'ACTIVO' : 'Pendiente') + '</span></div>';
            }
            document.getElementById('listaHorarios').innerHTML = html;
        }
        function verificarAlertas() {
            var misAlertas = obtenerAlertasDelTurno(turno);
            var status = document.getElementById('status'); var alertBox = document.getElementById('alertBox');
            if (misAlertas.length > 0) {
                status.className = 'status-badge active'; status.textContent = 'ALERTA - TURNO ' + turno;
                alertBox.className = 'alert-box visible'; document.getElementById('codigoAlerta').textContent = misAlertas[0].codigo;
                if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
            } else {
                status.className = 'status-badge inactive'; status.textContent = 'Sin alertas - Turno ' + turno;
                alertBox.className = 'alert-box';
            }
        }
        function enviarAviso() {
            var codigo = document.getElementById('codigoInput').value.trim();
            if (!codigo) { alert('Ingresa un codigo numerico'); return; }
            var tipo = turno === 1 ? 'alistador1' : 'alistador2';
            var usuario = sessionStorage.getItem('usuario');
            guardarAlerta(codigo, tipo, usuario);
            document.getElementById('codigoInput').value = '';
            verificarAlertas();
            alert('Aviso enviado al supervisor');
        }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        if (verificarSesion()) { sincronizarAlertas(); actualizarHorario(); verificarAlertas(); setInterval(function() { sincronizarAlertas(); verificarAlertas(); }, 5000); }
    </script>
</body>
</html>
